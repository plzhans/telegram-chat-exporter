# sops + age 로 로컬 설정 파일을 암호화한다.
#
# .env.local 은 gitignore 되어 있어 저장소에 없다. 새 기기에서 받아 쓸 수 있게
# 암호문(.env.local.enc)만 커밋한다. dotenv 형식이라 값만 암호화되고 변수 이름은
# 평문으로 남는다 - diff 에서 무엇이 바뀌었는지는 보인다.
#
#   암호화: sops -e --input-type dotenv --output-type dotenv .env.local > .env.local.enc
#   복호화: sops -d --input-type dotenv --output-type dotenv .env.local.enc > .env.local
#
# 확장자가 .enc 라 sops 가 형식을 못 알아채므로 --input-type/--output-type 을 항상 준다.
#
# 개인 키는 ~/.config/sops/age/keys.txt 에 있다. 수신자를 추가하려면 아래 age 항목에
# 공개 키를 한 줄 더 넣고 다시 암호화하면 된다(예: CI 용 키).
creation_rules:
  - path_regex: \.env(\.[^.]+)?$
    age: age1zg5n5zp069lamnw2kxk3nw58h4l68tp9wx9tld962sq6gg9en58spmmm54
