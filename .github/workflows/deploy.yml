# main 에 푸시되면 빌드해서 GitHub Pages 로 올린다.
#
# Pages 설정에서 Source 를 "GitHub Actions" 로 둬야 동작한다(Settings → Pages).
# 브랜치 배포(gh-pages) 방식이 아니라서 빌드 결과물을 저장소에 커밋하지 않는다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 코드 변경 없이 다시 배포하고 싶을 때(Variables 만 바꾼 경우 등) 수동 실행.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  # deploy-pages 가 OIDC 로 배포 토큰을 받아온다. 빠지면 배포 단계에서 권한 오류가 난다.
  id-token: write

# 배포는 한 번에 하나만. 연달아 푸시하면 앞선 실행을 버리고 마지막 것만 올린다.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 빌드가 커밋 해시를 박으므로(vite.config.ts 의 BUILD_INFO) .git 이 필요하다.
      # 얕은 클론이라도 HEAD 는 있으니 fetch-depth 는 기본값으로 둔다.
      - uses: actions/checkout@v4

      # package.json 의 packageManager 필드에서 pnpm 버전을 읽는다.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 타입체크를 따로 돌린다. 아래 빌드 단계에 `--base` 를 붙여야 해서 `pnpm build`
      # (= tsc -b && vite build) 를 그대로 쓸 수 없다 — pnpm 은 스크립트 뒤로 인자를
      # 넘겨주지 않아서 플래그가 조용히 무시된다.
      - run: pnpm exec tsc -b

      - name: Build
        # Pages 는 https://<user>.github.io/<repo>/ 로 서비스하므로 저장소 이름이 경로에 낀다.
        # vite.config.ts 의 base 는 `/` 라(로컬 dev·preview 주소를 깨끗하게 두려고) 여기서
        # 덮어쓴다. GITHUB_REPOSITORY 는 `owner/repo` 형태이고 `#*/` 가 owner 를 떼어낸다.
        #
        # 이 값이 틀리면 빌드는 성공하는데 브라우저에서 JS·CSS 가 404 로 죽는다.
        run: pnpm exec vite build --base="/${GITHUB_REPOSITORY#*/}/"
        env:
          # 앱 화면의 "소스 보기" 링크. 배포본과 같은 커밋이 올라간 저장소를 가리켜야 하므로
          # 손으로 적지 않고 CI 가 아는 값을 그대로 쓴다. 포크하거나 저장소를 옮겨도 따라간다.
          # (.env.local 은 gitignore 라 CI 체크아웃에 없다. Vite 가 process.env 의 VITE_*
          #  를 읽으므로 이 값이 번들에 박힌다.)
          VITE_SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
          # 공용 api_id 를 쓸 경우에만 채운다. Settings → Secrets and variables → Actions →
          # Variables 에 넣는다. 비어 있으면 앱이 "내 api_id 직접 입력"만 보여준다.
          # 클라이언트 번들에 그대로 박히는 값이라 Secrets 로 감춰도 의미가 없다 —
          # Readme 의 "공용 키 운영" 참고.
          VITE_TELEGRAM_API_ID: ${{ vars.VITE_TELEGRAM_API_ID }}
          VITE_TELEGRAM_API_HASH: ${{ vars.VITE_TELEGRAM_API_HASH }}

      # SPA 폴백. Pages 에는 리라이트 규칙이 없어서 /dialogs 로 새로고침하면 없는 파일이 된다.
      # 그때 Pages 가 404.html 을 내주므로, 그걸 index.html 과 같게 만들어 두면 라우터가
      # 경로를 읽고 정상 렌더한다. (응답 코드는 404 로 남지만 화면은 정상이다.)
      #
      # 언어별 디렉터리(dist/en/ 등)도 각자 자기 404.html 을 가져야 한다. 루트 것 하나로
      # 때우면 /en/dialogs 새로고침에서 한국어판이 뜬다 — 언어가 조용히 리셋된다.
      # 언어판이 없는 빌드에서도 그냥 아무것도 안 하고 지나간다.
      - name: SPA fallback
        run: |
          cp dist/index.html dist/404.html
          for dir in dist/*/; do
            if [ -f "$dir/index.html" ]; then
              cp "$dir/index.html" "$dir/404.html"
              echo "404 폴백 생성: $dir"
            fi
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
