# main 에 푸시되면 빌드해서 GitHub Pages 로 올린다.
#
# Pages 설정에서 Source 를 "GitHub Actions" 로 둬야 동작한다(Settings → Pages).
# 브랜치 배포(gh-pages) 방식이 아니라서 빌드 결과물을 저장소에 커밋하지 않는다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 코드 변경 없이 다시 배포하고 싶을 때(Variables 만 바꾼 경우 등) 수동 실행.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  # deploy-pages 가 OIDC 로 배포 토큰을 받아온다. 빠지면 배포 단계에서 권한 오류가 난다.
  id-token: write

# 배포는 한 번에 하나만. 연달아 푸시하면 앞선 실행을 버리고 마지막 것만 올린다.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 빌드가 커밋 해시를 박으므로(vite.config.ts 의 BUILD_INFO) .git 이 필요하다.
      # 얕은 클론이라도 HEAD 는 있으니 fetch-depth 는 기본값으로 둔다.
      - uses: actions/checkout@v4

      # package.json 의 packageManager 필드에서 pnpm 버전을 읽는다.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # 배포 주소를 Pages 설정에서 직접 읽어온다. 커스텀 도메인이면 루트(`/`)와 그 도메인을,
      # 아니면 `/<저장소이름>/` 과 `https://<소유자>.github.io` 를 준다.
      # 주소를 워크플로에 적어 두지 않는 이유가 이것이다 - 설정에서 도메인을 바꾸면 그대로 따라간다.
      - id: pages
        uses: actions/configure-pages@v5

      - run: pnpm install --frozen-lockfile

      # 타입체크를 따로 돌린다. 아래 빌드 단계에 `--base` 를 붙여야 해서 `pnpm build`
      # (= tsc -b && vite build) 를 그대로 쓸 수 없다 — pnpm 은 스크립트 뒤로 인자를
      # 넘겨주지 않아서 플래그가 조용히 무시된다.
      - run: pnpm exec tsc -b

      - name: Build
        # base 가 틀리면 빌드는 성공하는데 브라우저에서 JS·CSS 가 404 로 죽는다.
        # configure-pages 가 준 경로를 쓰되, Vite 는 끝에 `/` 가 있어야 하므로 보정한다.
        run: |
          BASE="${{ steps.pages.outputs.base_path }}"
          case "$BASE" in */) ;; *) BASE="$BASE/" ;; esac
          echo "base=$BASE  origin=${{ steps.pages.outputs.origin }}"
          pnpm exec vite build --base="$BASE"
        env:
          # canonical·hreflang·og:url 은 절대 주소여야 하는데, 소스는 자기가 어느 도메인에
          # 올라가는지 모른다. 비워 두면 빌드가 상대 경로로 떨어진다(로컬 빌드가 그 경우다).
          SITE_ORIGIN: ${{ steps.pages.outputs.origin }}
          # 앱 화면의 "소스 보기" 링크. 배포본과 같은 커밋이 올라간 저장소를 가리켜야 하므로
          # 손으로 적지 않고 CI 가 아는 값을 그대로 쓴다. 포크하거나 저장소를 옮겨도 따라간다.
          # (.env.local 은 gitignore 라 CI 체크아웃에 없다. Vite 가 process.env 의 VITE_*
          #  를 읽으므로 이 값이 번들에 박힌다.)
          VITE_GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          # 내보낸 문서 하단에 적히는 "이 도구가 돌아가는 곳" 주소. 파일만 건네받은 사람이
          # 따라올 수 있어야 한다. configure-pages 가 준 실제 배포 주소를 그대로 쓴다.
          VITE_SITE_URL: ${{ steps.pages.outputs.base_url }}
          # 랜딩의 내려받기 버튼이 걸 주소. **둘 다 비워 두는 것이 기본이다** — 그러면
          # 위 VITE_GITHUB_REPO_URL 의 릴리스에서 코드 기본값 이름으로 조립한다
          # (src/shared/config/release.ts). 릴리스 워크플로도 같은 규칙으로 그 이름을 정하므로
          # 아무것도 안 채우면 양쪽이 저절로 맞는다.
          #
          # 배포처가 GitHub 가 아니면(자체 서버·CDN·S3 등) 주소를 통째로 넣는다. 그때는
          # 조립하지 않고 그 값이 그대로 버튼에 걸린다.
          VITE_RELEASE_DOWNLOAD_URL: ${{ vars.VITE_RELEASE_DOWNLOAD_URL }}
          VITE_RELEASE_ASSET_FILE_NAME: ${{ vars.VITE_RELEASE_ASSET_FILE_NAME }}
          # 공용 api_id. 없으면 앱이 "내 api_id 직접 입력"만 보여준다.
          #
          # Variables 든 Secrets 든 넣어 둔 쪽에서 읽는다. **둘 다 있어야 공용 키가 성립하므로**
          # 한쪽만 채우면 나머지가 빈 값이 되어 조용히 직접 입력 화면으로 떨어진다.
          # 어차피 클라이언트 번들에 박히는 값이라 Secrets 로 감춰도 실익은 없다 —
          # DEVELOP.ko.md 의 "공용 키 운영" 참고.
          VITE_TELEGRAM_API_ID: ${{ vars.VITE_TELEGRAM_API_ID || secrets.VITE_TELEGRAM_API_ID }}
          VITE_TELEGRAM_API_HASH: ${{ vars.VITE_TELEGRAM_API_HASH || secrets.VITE_TELEGRAM_API_HASH }}
          # 구글 애널리틱스 측정 ID. 이 값이 있어야 애널리틱스가 켜지고 CSP 에 구글 도메인이
          # 열리며, 첫 화면에 외부 연결 고지가 나온다. 비어 있으면 셋 다 꺼진 채로 빌드된다.
          # Settings → Secrets and variables → Actions → Variables 에 넣는다.
          # 클라이언트 번들에 그대로 박히는 공개 식별자라 Secrets 가 아니라 Variables 다.
          VITE_GOOGLE_ANALYTICS_ID: ${{ vars.VITE_GOOGLE_ANALYTICS_ID }}
          # 구글 애드센스 게시자 ID. 비어 있으면 광고가 들어가지 않고 CSP 도 안 열린다.
          # 넣는 순간 광고망 호스트가 script/frame/img/connect 에 전부 추가된다.
          VITE_GOOGLE_ADSENSE_ID: ${{ vars.VITE_GOOGLE_ADSENSE_ID }}

      # SPA 폴백(404.html)은 빌드가 직접 찍는다. 여기서 만들지 않는다.
      #
      # 예전에는 이 자리에서 `cp dist/index.html dist/404.html` 로 만들었다. 지금은
      # index.html 이 **스크립트가 없는 정적 랜딩**이라 그 복사가 성립하지 않는다 —
      # 앱이 아예 안 뜨는 폴백이 된다. 어느 문서가 앱 셸인지는 빌드만 아는 사실이라
      # vite.config.ts 의 localizedPages 가 404.html 과 start/index.html 을 함께 찍는다.

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
