# 릴리스를 자동으로 낸다.
#
# main 에 커밋이 쌓이면 release-please 가 "다음 버전은 이것" 이라는 **Release PR** 을 열어
# 둔다. 그 PR 을 머지하는 순간이 릴리스다 - 봇이 버전을 올리고, CHANGELOG 를 쓰고,
# `release/vX.Y.Z` 태그와 GitHub 릴리스를 만든다. 버전은 커밋 메시지에서 정해진다
# (`feat` → minor, `fix` → patch, `!` → major. DEVELOP.md 의 "커밋 규약" 참고).
#
# ## 왜 배포까지 이 파일에 있나
#
# **GITHUB_TOKEN 이 만든 태그는 다른 워크플로를 깨우지 않는다.** 무한 루프를 막으려는
# GitHub 의 규칙이라, 봇이 태그를 붙여도 `on: push: tags` 로 기다리는 워크플로는 안 돈다.
# 그래서 릴리스 직후 할 일(zip 만들기·배포)을 같은 실행 안에 이어 붙인다.
#
# 개인 토큰(PAT)을 쓰면 예전 구조를 유지할 수 있지만, 만료 없는 자격증명을 저장소에 상주
# 시키는 셈이라 쓰지 않았다.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # 1단계. 평소에는 Release PR 을 열거나 갱신만 하고 끝난다.
  #        그 PR 이 머지된 커밋에서 돌 때만 실제 릴리스가 만들어진다.
  release_please:
    runs-on: ubuntu-latest
    # 매니페스트 모드는 출력 이름에 패키지 경로를 붙인다(`.--tag_name`). 단일 패키지일 때는
    # 접두사 없는 이름도 함께 오므로 둘 다 받아 둔다 - 한쪽이 비어도 릴리스가 멈추지 않는다.
    outputs:
      created: ${{ steps.release.outputs.releases_created || steps.release.outputs.release_created }}
      tag: ${{ steps.release.outputs['.--tag_name'] || steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs['.--version'] || steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2단계. 내려받아 쓰는 배포본을 만들어 릴리스에 붙인다.
  artifact:
    needs: release_please
    if: needs.release_please.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # 빌드 출처 증명용. Sigstore 서명(id-token)과 증명 저장(attestations).
      id-token: write
      attestations: write
    steps:
      # 봇이 방금 붙인 태그를 체크아웃한다. main 을 그대로 쓰면 태그 이후 들어온 커밋이
      # 섞여서, 태그가 가리키는 것과 다른 물건이 나갈 수 있다.
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_please.outputs.tag }}

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 고위험 취약점을 가진 의존성이 있으면 릴리스를 멈춘다(Dependabot 은 알리기만 한다).
      # high 미만은 통과시킨다 - 고칠 수 없는 전이 의존성 때문에 릴리스가 막히면 안 된다.
      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Build
        run: pnpm build:standalone
        env:
          VITE_GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          VITE_TELEGRAM_API_ID: ${{ vars.VITE_TELEGRAM_API_ID || secrets.VITE_TELEGRAM_API_ID }}
          VITE_TELEGRAM_API_HASH: ${{ vars.VITE_TELEGRAM_API_HASH || secrets.VITE_TELEGRAM_API_HASH }}
          # 애널리틱스·광고는 넘기지 않는다. 넘겨도 standalone 빌드는 무시한다.

      # 같은 zip 을 이름 두 개로 올린다. 버전이 붙은 쪽은 받아 둔 사람이 파일만 보고 버전을
      # 알기 위한 것이고, 버전이 없는 쪽은 사이트가 거는 고정 주소용이다 -
      #
      #   https://github.com/<소유자>/<저장소>/releases/latest/download/<에셋 이름>
      #
      # 그 이름은 저장소 Variable 이 있으면 그것, 없으면 코드의 기본값을 쓴다. 사이트 빌드도
      # 같은 규칙으로 읽으므로 아무것도 안 채우면 양쪽이 저절로 맞는다.
      - name: Package
        id: pack
        env:
          TAG: ${{ needs.release_please.outputs.tag }}
          VERSION: ${{ needs.release_please.outputs.version }}
        run: |
          NAME="telegram-exporter-v$VERSION"
          ASSET="${{ vars.VITE_RELEASE_ASSET_FILE_NAME }}"
          if [ -z "$ASSET" ]; then
            ASSET=$(node -p "require('fs').readFileSync('src/shared/config/release.ts','utf8').match(/DEFAULT_RELEASE_ASSET = '([^']+)'/)[1]")
          fi

          mv dist-standalone "$NAME"
          cp .github/release-assets/README.txt "$NAME/README.txt"
          zip -r -q "$NAME.zip" "$NAME"
          cp "$NAME.zip" "$ASSET"
          unzip -l "$NAME.zip"

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      # 이 zip 이 이 저장소의 이 커밋에서 만들어졌음을 서명으로 남긴다. 받는 쪽 확인:
      #
      #   gh attestation verify telegram-exporter.zip --repo <소유자>/<저장소>
      #
      # 파일을 올리기 전에 붙인다. 증명이 실패하면 파일이 공개되지 않아야 한다.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ steps.pack.outputs.name }}.zip
            ${{ steps.pack.outputs.asset }}

      # 릴리스는 봇이 이미 만들어 두었다. 여기서는 파일만 붙이고, 받는 사람이 릴리스 화면에서
      # 바로 읽을 실행 안내를 CHANGELOG 아래에 덧붙인다.
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release_please.outputs.tag }}
          NAME: ${{ steps.pack.outputs.name }}
          ASSET: ${{ steps.pack.outputs.asset }}
        run: |
          gh release upload "$TAG" "$NAME.zip" "$ASSET" --clobber

          {
            gh release view "$TAG" --json body -q .body
            cat <<'EOF'

          ---

          ### 내려받아 실행하기 (Run it locally)

          1. 아래 zip 을 받아 압축을 푼다.
          2. `index.html` 을 더블클릭한다. 웹서버도, 설치도 필요 없다.

          텔레그램에 연결해야 하므로 인터넷은 필요하다. 이 배포본은 브라우저가 강제하는 CSP 로
          **텔레그램 외에는 아무 곳에도 연결하지 못하고**, 애널리틱스·광고가 들어 있지 않다.

          ---

          1. Download the zip below and unpack it.
          2. Double-click `index.html`. No web server, no installation.

          It needs internet access to reach Telegram. The build ships with a CSP that allows
          **no network destination other than Telegram**, and contains no analytics or ads.
          EOF
          } > notes.md

          gh release edit "$TAG" --notes-file notes.md

  # 3단계. **이 릴리스가 latest 일 때만** 사이트를 배포한다.
  #
  # 릴리스가 났다고 다 내보내면 안 된다. 프리릴리스(beta·rc)는 GitHub 이 latest 로 치지
  # 않는데, 사이트의 내려받기 버튼은 `releases/latest` 를 가리킨다. 그대로 배포하면
  # 사이트만 beta 로 앞서 나가고 내려받는 zip 은 옛 안정판이 되는 어긋남이 생긴다.
  #
  # 그래서 GitHub 이 지금 latest 로 주는 태그와 방금 만든 태그가 같은지 직접 물어본다.
  # zip 과 출처 증명은 프리릴리스에도 붙는다(위 artifact) - 베타를 시험하는 사람도 받아야
  # 하기 때문이다. 막는 것은 사이트 배포뿐이다.
  check_latest:
    needs: release_please
    if: needs.release_please.outputs.created == 'true'
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release_please.outputs.tag }}
        run: |
          # 안정판이 하나도 없으면 404 다. 그때는 배포하지 않는다.
          LATEST=$(gh api "repos/${{ github.repository }}/releases/latest" -q .tag_name 2>/dev/null || echo '')
          echo "이번 태그: $TAG / 지금 latest: ${LATEST:-(없음)}"
          if [ -n "$LATEST" ] && [ "$LATEST" = "$TAG" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            echo "::notice::latest 가 아니라 사이트 배포를 건너뛴다(프리릴리스로 보인다)."
          fi

  pages:
    needs: [release_please, check_latest]
    if: needs.check_latest.outputs.is_latest == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      ref: ${{ needs.release_please.outputs.tag }}
    permissions:
      contents: read
      pages: write
      id-token: write
    secrets: inherit
