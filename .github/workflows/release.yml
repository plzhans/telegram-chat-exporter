# `release/vX.Y.Z` 태그가 붙으면 내려받아 실행하는 배포본을 만들어 릴리스에 올린다.
#
# 웹 배포(deploy.yml)와 나가는 물건이 다르다. 이쪽은 웹서버 없이 `index.html` 을 열어
# 쓰는 형태(`pnpm build:standalone`)라, 받아서 압축만 풀면 그대로 동작한다.
name: Release

on:
  push:
    tags:
      # `v` 를 붙여 둔다. `release/1.0.0` 처럼 와도 받아 두고 아래에서 형식을 검사한다.
      - 'release/*'

# 릴리스를 만들려면 쓰기 권한이 필요하다. 나머지는 기본값(읽기)으로 둔다.
permissions:
  contents: write
  # 빌드 출처 증명용. Sigstore 서명(id-token)과 증명 저장(attestations).
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 빌드가 커밋 해시를 박으므로(vite.config.ts 의 BUILD_INFO) .git 이 필요하다.
      - uses: actions/checkout@v7

      # 태그에서 버전을 뽑고, **package.json 과 같은지 확인한다.**
      #
      # 화면 하단과 내보낸 문서에 찍히는 버전은 package.json 에서 온다. 태그만 올리고
      # package.json 을 안 고치면 `v1.0.0` 이라는 이름으로 `v0.1.0` 이라 적힌 파일이
      # 나간다 - 받은 사람이 어느 쪽을 믿어야 할지 알 수 없게 된다. 그래서 여기서 멈춘다.
      - id: version
        name: Resolve version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#release/}"
          case "$VERSION" in
            v*) ;;
            *) echo "::error::태그는 release/vX.Y.Z 형식이어야 한다 (받은 값: $TAG)"; exit 1 ;;
          esac

          PKG="v$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PKG" ]; then
            echo "::error::태그($VERSION)와 package.json($PKG)의 버전이 다르다. package.json 을 먼저 올리고 다시 태그를 붙여라."
            exit 1
          fi

          # 버전이 안 붙는 에셋 이름. 사이트의 내려받기 버튼이 이 이름으로 고정 주소를
          # 건다(아래 Package 단계 주석).
          #
          # **이름을 여기 적지 않고 읽어 온다.** 사이트와 릴리스가 서로 다른 이름을 보면
          # 빌드도 릴리스도 통과하는데 버튼만 404 가 된다 - 아무도 모르는 채로 깨져 있다.
          # 출처를 하나로 두면 어긋날 수가 없다: 저장소 Variable 이 있으면 그것(사이트
          # 빌드도 같은 Variable 을 읽는다), 없으면 코드의 기본값.
          ASSET="${{ vars.VITE_RELEASE_ASSET_FILE_NAME }}"
          if [ -z "$ASSET" ]; then
            ASSET=$(node -p "require('fs').readFileSync('src/shared/config/release.ts','utf8').match(/DEFAULT_RELEASE_ASSET = '([^']+)'/)[1]")
          fi
          echo "에셋 이름: $ASSET"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=telegram-exporter-$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      # package.json 의 packageManager 필드에서 pnpm 버전을 읽는다.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 고위험 취약점을 가진 의존성이 있으면 릴리스를 멈춘다(Dependabot 은 알리기만 한다).
      # high 미만은 통과시킨다 - 고칠 수 없는 전이 의존성 때문에 릴리스가 막히면 안 된다.
      # 예외가 필요하면 package.json 의 `pnpm.auditConfig.ignoreCves` 에 적는다.
      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Build
        run: pnpm build:standalone
        env:
          # 앱 화면의 "소스 보기" 링크. 받은 파일과 같은 커밋이 올라간 곳을 가리켜야 한다.
          VITE_GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          # 내보낸 문서 하단에 적히는 "이 도구가 돌아가는 곳". 웹 배포 주소를 아는 쪽이
          # 저장소 Variables 에 넣어 둔다. 없으면 그 줄이 빠질 뿐이다.
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
          # 공용 api_id. 없으면 앱이 "내 api_id 직접 입력"만 보여준다(deploy.yml 과 같은 규칙).
          VITE_TELEGRAM_API_ID: ${{ vars.VITE_TELEGRAM_API_ID || secrets.VITE_TELEGRAM_API_ID }}
          VITE_TELEGRAM_API_HASH: ${{ vars.VITE_TELEGRAM_API_HASH || secrets.VITE_TELEGRAM_API_HASH }}
          # 애널리틱스·광고는 넘기지 않는다. 넘겨도 standalone 빌드는 무시한다
          # (vite.config.ts 의 `standalone`, shared/analytics/gtag.ts 참고).

      # 압축을 풀었을 때 파일이 흩어지지 않도록 이름 있는 폴더 하나로 감싼다.
      #
      # 같은 zip 을 **이름 두 개로** 올린다. 버전이 붙은 쪽은 받아 둔 사람이 파일만 보고
      # 어느 버전인지 알기 위한 것이고, 버전이 없는 쪽은 사이트가 거는 고정 주소용이다 -
      #
      #   https://github.com/<소유자>/<저장소>/releases/latest/download/<에셋 이름>
      #
      # 이 주소의 `latest` 는 태그 이름이 아니라 GitHub 가 "Latest 배지가 붙은 릴리스" 로
      # 풀어 주는 예약어다. 뒤쪽 **파일명은 그대로 맞아야** 하므로, 에셋 이름이 릴리스마다
      # 달라지면 사이트에 적어 둘 고정 문자열이 없어진다. 그래서 한 벌 더 올린다.
      #
      # 그 이름은 위 Resolve version 단계가 정한다(저장소 Variable 또는 코드의 기본값).
      - name: Package
        run: |
          NAME="${{ steps.version.outputs.name }}"
          mv dist-standalone "$NAME"
          cp .github/release-assets/README.txt "$NAME/README.txt"
          zip -r -q "$NAME.zip" "$NAME"
          cp "$NAME.zip" "${{ steps.version.outputs.asset }}"
          unzip -l "$NAME.zip"

      # 이 zip 이 이 저장소의 이 커밋에서 만들어졌음을 서명으로 남긴다. 받는 쪽 확인:
      #
      #   gh attestation verify telegram-exporter.zip --repo <소유자>/<저장소>
      #
      # 릴리스를 만들기 전에 붙인다. 증명이 실패하면 파일이 공개되지 않아야 한다.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{ steps.version.outputs.name }}.zip
            ${{ steps.version.outputs.asset }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          NAME: ${{ steps.version.outputs.name }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          ASSET: ${{ steps.version.outputs.asset }}
        run: |
          # 받는 사람이 릴리스 화면에서 바로 읽을 안내. 아래에 커밋 목록이 자동으로 붙는다.
          cat > notes.md <<'EOF'
          ### 내려받아 실행하기 (Run it locally)

          1. 아래 zip 을 받아 압축을 푼다.
          2. `index.html` 을 더블클릭한다. 웹서버도, 설치도 필요 없다.

          텔레그램에 연결해야 하므로 인터넷은 필요하다. 이 배포본은 브라우저가 강제하는 CSP 로
          **텔레그램 외에는 아무 곳에도 연결하지 못하고**, 애널리틱스·광고가 들어 있지 않다.

          ---

          1. Download the zip below and unpack it.
          2. Double-click `index.html`. No web server, no installation.

          It needs internet access to reach Telegram. The build ships with a CSP that allows
          **no network destination other than Telegram**, and contains no analytics or ads.
          EOF

          gh release create "$TAG" "$NAME.zip" "$ASSET" \
            --title "$VERSION" \
            --notes-file notes.md \
            --generate-notes
