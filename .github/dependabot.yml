# 의존성을 주기적으로 올려 준다.
#
# 보안 취약점 대응은 이것 없이도 이미 돌아간다(저장소 설정의 Dependabot security updates).
# 이 파일이 더하는 것은 **평시 업데이트**다 - 액션 버전을 손으로 올리는 일을 없앤다.
version: 2

updates:
  # GitHub Actions. Node 런타임 지원이 끊기는 일이 주기적으로 있어서 이쪽이 특히 값이 있다.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # 액션은 한꺼번에 올려도 위험이 낮고, PR 이 흩어지면 오히려 안 보게 된다.
    groups:
      actions:
        patterns: ['*']
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # 마이너·패치는 묶는다. 매주 PR 이 열 개씩 열리면 아무도 안 본다.
      minor-and-patch:
        update-types: [minor, patch]
      # 메이저도 묶되 **따로** 둔다. 대개 손볼 것이 있어서(vite 6→8, tailwind 3→4 처럼)
      # 마이너와 같은 PR 에 넣으면 쉬운 것까지 함께 막힌다.
      major:
        update-types: [major]
    ignore:
      # GramJS 는 **올리면 안 된다.** 같은 패키지로 Node 빌드와 브라우저 빌드를 따로
      # 배포하는데 그 경계가 버전마다 달라진다 - DEVELOP.ko.md 의 "telegram 버전을 올리지
      # 말 것" 참고. package.json 에도 캐럿 없이 고정해 두었다.
      - dependency-name: telegram
